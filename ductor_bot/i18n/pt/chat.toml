# -- Gerenciamento de sessão ---------------------------------------------------

[session]
error_header = "**Erro de Sessão**"
error_body = """\
[{model}] Algo deu errado.
Sua sessão foi preservada — envie outra mensagem para tentar novamente.
Use /new para começar uma sessão nova se o problema persistir."""
