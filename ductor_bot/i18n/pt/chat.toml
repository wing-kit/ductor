# -- Parar/Interromper ---------------------------------------------------------

[stop]
header = "**Agente Parado**"
killed = "{provider} encerrado. Todas as mensagens na fila foram descartadas."
nothing = "Nada rodando no momento."

[interrupt]
done = "{count} processo(s) interrompido(s)."
