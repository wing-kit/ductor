# -- Aviso Gemini --------------------------------------------------------------

[gemini]
missing_key = """\
Gemini está configurado para autenticação por API key, mas `gemini_api_key` em \
`~/.ductor/config/config.json` está `"null"` ou vazio.
Por que isso é necessário: quando o ductor chama o Gemini CLI como processo externo, \
o Gemini CLI não expõe uma API key inserida internamente para o chamador.
Defina uma API key real em `gemini_api_key` e reinicie o `ductor`."""

