# -- Timeout -------------------------------------------------------------------

[timeout]
error_header = "**Timeout**"
error_body = """\
[{model}] CLI foi encerrado após {minutes} min.
Sua sessão foi preservada — envie uma mensagem para continuar de onde parou.
Use /new para começar uma sessão nova."""

result_header = "**Timeout**"
result_body = """\
O agente atingiu o timeout após {elapsed}s (limite: {configured}s).
Tente um prompt mais curto ou divida em etapas menores."""

warning_minutes = "Timeout em {mins} min"
