# -- Welkom (Telegram) -------------------------------------------------------------

[welcome]
header = "**Welkom bij ductor.dev{name}!**"
tagline = """\
Deploy vanuit je broekzak. Automatiseer vanaf de bank.
Claude Code, Codex & Gemini — rechtstreeks via Telegram."""
hint_model = "/model — modellen wisselen"
hint_info = "/info — docs & links"
