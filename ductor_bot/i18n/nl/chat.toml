# Nederlandse chat-strings (Markdown, verzonden naar Telegram/Matrix/API).
# Vriendelijk, warm, licht humoristisch — als een behulpzame collega.

# -- Sessiebeheer -----------------------------------------------------------------

[session]
error_header = "**Sessiefout**"
error_body = """\
[{model}] Er ging iets mis.
Je sessie is bewaard — stuur gewoon nog een bericht om het opnieuw te proberen.
Gebruik /new om een frisse sessie te starten als het probleem aanhoudt."""
error_cause = "**Oorzaak:** {hint}"
error_detail = "**Detail:** `{detail}`"
error_auth = "Authenticatie mislukt. Log opnieuw in via de CLI (bijv. `codex auth` of controleer je API-key)."
error_rate = "Rate-limit bereikt. Even ademhalen en opnieuw proberen."
error_context = "Contextlimiet bereikt. Gebruik /new om een frisse sessie te starten."

reset_header = "**Sessie gereset**"
reset_body = """\
Sessie gereset voor {provider} in deze chat.
Andere provider-sessies zijn bewaard gebleven.
Stuur een bericht om verder te gaan."""

age_warning = "[Sessie is {age} oud. Gebruik /new voor een frisse start.]"

recovered = "_De vorige sessie kon niet worden hersteld. Er is automatisch een nieuwe gestart._"
sigkill = "De uitvoering werd onderbroken. Stuur hetzelfde verzoek opnieuw."

not_found = "Sessie '{name}' niet gevonden."
ended = "Sessie '{name}' is beëindigd. Start een nieuwe met /session."
still_running = "Sessie '{name}' is nog bezig. Wachten of /stop gebruiken om te annuleren."

# -- Stop/onderbreking -------------------------------------------------------------

[stop]
header = "**Agent gestopt**"
killed = "{provider} beëindigd. Alle wachtende berichten weggegooid."
nothing = "Er draait op dit moment niets."

[interrupt]
done = "{count} proces(sen) onderbroken."
nothing = "Geen actieve processen."

[abort_all]
done = "{count} proces(sen) over alle agents gestopt."
nothing = "Geen actieve processen gevonden op enige agent."

# -- Timeout -----------------------------------------------------------------------

[timeout]
error_header = "**Timeout**"
error_body = """\
[{model}] CLI is beëindigd na {minutes} min.
Je sessie is bewaard — stuur een bericht om verder te gaan waar je was gebleven.
Gebruik /new om een frisse sessie te starten."""

result_header = "**Timeout**"
result_body = """\
De agent heeft een timeout na {elapsed}s (limiet: {configured}s).
Probeer een kortere prompt, of vraag in kleinere stappen."""

warning_minutes = "Timeout over {mins} min"
warning_seconds = "Timeout over {secs}s"
extended = "Timeout verlengd (+{secs}s, nog {remaining} over)"

generic = "Agent had een timeout. Probeer het opnieuw."

