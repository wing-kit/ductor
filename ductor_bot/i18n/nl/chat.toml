btn_know = "Laten we elkaar leren kennen!"
btn_system = "Bekijk het systeem!"
btn_who = "Wie ben jij? Wie ben ik?"

prompt_know = """\
Hey, ik heb net ductor.dev opgezet en ik wil dat je me leert kennen. \
Vraag me alles wat je moet weten zodat we goed kunnen samenwerken — \
mijn naam, wat ik doe, waar ik aan werk, hoe ik graag communiceer. \
Sla op wat je leert in je geheugen."""
prompt_system = """\
Kijk eens rond op het systeem waar je op draait. \
Check het OS, geïnstalleerde tools, projectmappen, wat je interessant vindt. \
Geef me een kort overzicht van wat je ziet."""
prompt_who = """\
Laten we beginnen! Stel je voor — wie ben je, wat kun je voor me doen? \
Vraag me dan wie ik ben en waarmee ik hulp nodig heb."""

