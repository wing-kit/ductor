# Cadenas de chat en español (Markdown, enviadas a Telegram/Matrix/API).
# Tono cercano, cálido — como un colega simpático, no un robot corporativo.

# -- Gestión de sesiones -------------------------------------------------------

[session]
error_header = "**Error de sesión**"
error_body = """\
[{model}] Algo salió mal.
Tu sesión se ha conservado — envía otro mensaje para reintentar.
Usa /new para empezar una sesión nueva si el problema persiste."""
error_cause = "**Causa:** {hint}"
error_detail = "**Detalle:** `{detail}`"
error_auth = "Autenticación fallida. Por favor, vuelve a autenticarte en la CLI (p. ej. `codex auth` o revisa tu API key)."
