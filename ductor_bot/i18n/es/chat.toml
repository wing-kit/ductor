# -- Advertencia de Gemini -----------------------------------------------------

[gemini]
missing_key = """\
Gemini está configurado en modo API-key, pero `gemini_api_key` en \
`~/.ductor/config/config.json` es `"null"` o está vacío.
Por qué es necesario: cuando ductor llama a la CLI de Gemini como proceso externo, \
la CLI de Gemini no expone una API key introducida internamente al proceso que la llama.
Configura una API key real en `gemini_api_key` y reinicia `ductor`."""

