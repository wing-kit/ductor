error_context = "Longitud de contexto excedida. Usa /new para empezar una sesión nueva."

reset_header = "**Sesión reiniciada**"
reset_body = """\
Sesión reiniciada para {provider} en este chat.
Las sesiones de otros proveedores se han conservado.
¡Escribe un mensaje para continuar!"""

age_warning = "[La sesión tiene {age}. Usa /new para empezar de cero.]"

