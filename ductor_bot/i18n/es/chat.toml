# -- Timeout -------------------------------------------------------------------

[timeout]
error_header = "**Timeout**"
error_body = """\
[{model}] La CLI fue terminada tras {minutes} min.
Tu sesión se ha conservado — envía un mensaje para continuar donde lo dejaste.
Usa /new para empezar una sesión nueva."""

result_header = "**Timeout**"
result_body = """\
El agente agotó el tiempo tras {elapsed}s (límite: {configured}s).
Prueba con un prompt más corto o pregunta en pasos más pequeños."""

warning_minutes = "Timeout en {mins} min"
warning_seconds = "Timeout en {secs}s"
extended = "Timeout extendido (+{secs}s, quedan {remaining})"

generic = "El agente agotó el tiempo. Por favor, inténtalo de nuevo."

