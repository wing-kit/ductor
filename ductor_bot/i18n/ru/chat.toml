# Русские строки чата (Markdown, отправляются в Telegram/Matrix/API).
# Дружелюбный, тёплый тон — как хороший коллега, не корпоративный робот.

# -- Управление сессиями -------------------------------------------------------

[session]
error_header = "**Ошибка сессии**"
error_body = """\
[{model}] Что-то пошло не так.
Твоя сессия на месте — просто отправь сообщение ещё раз.
Используй /new, чтобы начать с чистого листа."""
error_cause = "**Причина:** {hint}"
error_detail = "**Подробности:** `{detail}`"
error_auth = "Ошибка аутентификации. Пожалуйста, авторизуйся заново (напр. `codex auth` или проверь API-ключ)."
error_rate = "Лимит запросов исчерпан. Подожди немного и попробуй снова."
error_context = "Превышен лимит контекста. Используй /new, чтобы начать новую сессию."

reset_header = "**Сессия сброшена**"
reset_body = """\
Сессия сброшена для {provider} в этом чате.
Сессии других провайдеров сохранены.
Пиши — продолжим!"""

age_warning = "[Сессии уже {age}. Используй /new для свежего старта.]"

recovered = "_Предыдущую сессию не удалось восстановить. Новая сессия запущена автоматически._"
sigkill = "Выполнение было прервано. Пожалуйста, отправь тот же запрос ещё раз."

not_found = "Сессия '{name}' не найдена."
ended = "Сессия '{name}' завершена. Начни новую через /session."
still_running = "Сессия '{name}' ещё работает. Подожди или останови через /stop."

# -- Остановка/прерывание ------------------------------------------------------

[stop]
header = "**Агент остановлен**"
killed = "{provider} остановлен. Все сообщения в очереди отброшены."
nothing = "Сейчас ничего не работает. Всё тихо."

[interrupt]
done = "Прервано процессов: {count}."
nothing = "Нет активных процессов."

[abort_all]
done = "Остановлено {count} процесс(ов) на всех агентах."
nothing = "Активных процессов не найдено ни на одном агенте."

# -- Таймаут -------------------------------------------------------------------

[timeout]
error_header = "**Таймаут**"
error_body = """\
[{model}] CLI был завершён через {minutes} мин.
Твоя сессия на месте — отправь сообщение, чтобы продолжить.
Используй /new для новой сессии."""

result_header = "**Таймаут**"
result_body = """\
Агент не уложился за {elapsed}с (лимит: {configured}с).
Попробуй более короткий промпт или разбей задачу на шаги."""

warning_minutes = "Таймаут через {mins} мин."
warning_seconds = "Таймаут через {secs}с"
extended = "Таймаут продлён (+{secs}с, осталось {remaining})"

generic = "Агент не уложился в отведённое время. Попробуй ещё раз."

