# -- Предупреждение Gemini -----------------------------------------------------

[gemini]
missing_key = """\
Gemini настроен на авторизацию через API-ключ, но `gemini_api_key` в \
`~/.ductor/config/config.json` равен `"null"` или пуст.
Почему это нужно: когда ductor вызывает Gemini CLI как внешний процесс, \
Gemini CLI не передаёт внутренне введённый API-ключ вызывающей стороне.
Укажи настоящий API-ключ в `gemini_api_key` и перезапусти `ductor`."""

