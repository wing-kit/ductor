# Deutsche Chat-Strings (Markdown, gesendet an Telegram/Matrix/API).
# Sympathisch, humorvoll — nicht steif, nicht albern.

# -- Session-Verwaltung --------------------------------------------------------

[session]
error_header = "**Session-Fehler**"
