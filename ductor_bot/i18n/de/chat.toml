# -- Gemini-Warnung -----------------------------------------------------------

[gemini]
missing_key = """\
Gemini ist auf API-Key-Auth eingestellt, aber `gemini_api_key` in \
`~/.ductor/config/config.json` ist `"null"` oder leer.
Warum das nötig ist: Wenn ductor die Gemini CLI als externen Prozess aufruft, \
gibt die Gemini CLI einen intern eingegebenen API-Key nicht an den Aufrufer weiter.
Setze einen echten API-Key in `gemini_api_key` und starte `ductor` neu."""

