# -- Timeout -------------------------------------------------------------------

[timeout]
error_header = "**Timeout**"
error_body = """\
[{model}] Le CLI a été arrêté après {minutes} min.
Ta session est toujours là — envoie un message pour reprendre où tu en étais.
Utilise /new pour une session toute neuve."""

result_header = "**Timeout**"
result_body = """\
L'agent a expiré après {elapsed}s (limite : {configured}s).
Essaie un prompt plus court ou procède par petites étapes."""

