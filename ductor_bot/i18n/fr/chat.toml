# -- Avertissement Gemini ------------------------------------------------------

[gemini]
missing_key = """\
Gemini est configuré en mode clé API, mais `gemini_api_key` dans \
`~/.ductor/config/config.json` est `"null"` ou vide.
Pourquoi c'est nécessaire : quand ductor appelle le CLI Gemini en tant que \
processus externe, le CLI Gemini ne transmet pas une clé API entrée en interne à l'appelant.
Définis une vraie clé API dans `gemini_api_key` et redémarre `ductor`."""

