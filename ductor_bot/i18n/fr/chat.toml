# Chaînes de chat en français (Markdown, envoyées à Telegram/Matrix/API).
# Ton amical, chaleureux, légèrement humoristique — comme un collègue sympa.

# -- Gestion des sessions ------------------------------------------------------

[session]
error_header = "**Erreur de session**"
error_body = """\
[{model}] Quelque chose a mal tourné.
Ta session est toujours là — renvoie un message pour réessayer.
Utilise /new pour repartir de zéro si le problème persiste."""
error_cause = "**Cause :** {hint}"
error_detail = "**Détail :** `{detail}`"
error_auth = "Authentification échouée. Reconnecte-toi au CLI (par ex. `codex auth` ou vérifie ta clé API)."
error_rate = "Limite de requêtes atteinte. Respire un coup et réessaie."
error_context = "Limite de contexte dépassée. Utilise /new pour une session toute fraîche."

reset_header = "**Session réinitialisée**"
reset_body = """\
Session réinitialisée pour {provider} dans ce chat uniquement.
Les sessions des autres providers sont toujours là.
Envoie un message pour continuer."""

